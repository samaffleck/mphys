<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"/>
    <title>mphys</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1e1e1e; overflow: hidden; }
      #canvas {
        position: absolute;
        top: 0; left: 0;
        margin: 0; border: 0;
        width: 100%; height: 100%;
        display: block;
      }
      #canvas:focus { outline: none; }
      #loading {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: #cccccc; font-family: sans-serif; font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading mphys…</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    <script type='text/javascript'>
      var Module = {
        preRun: [],
        postRun: [function() {
          var el = document.getElementById('loading');
          if (el) el.style.display = 'none';
        }],
        print: function() { console.log(Array.prototype.slice.call(arguments).join(' ')); },
        printErr: function() { console.error(Array.prototype.slice.call(arguments).join(' ')); },
        canvas: document.getElementById('canvas'),
        setStatus: function(text) { if (text) console.log('status: ' + text); }
      };
      window.onerror = function(e) { console.error('onerror: ' + e); };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
